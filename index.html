<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#6FC7F5">
<title>Woof! Roar! Vroom!</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
<style>
  :root{
    --sky-hi:#BDE8FF; --sky:#6FC7F5; --sky-lo:#8FD4FA;
    --grass:#5BBB4E; --grass-dk:#3E9B3C;
    --jungle:#4CAF6D; --jungle-dk:#2E7D4F;
    --dirt:#C98A4B; --dirt-dk:#A96B31;
    --sun:#FFD23F; --cherry:#FF5A5F; --ink:#29335C;
    --cloud:#FFFFFF;
    --fun-font: ui-rounded, "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Segoe UI", sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; overflow:hidden; }
  body{
    font-family:var(--fun-font);
    color:var(--ink);
    user-select:none; -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
  }
  #game{
    position:fixed; inset:0;
    height:100vh; height:100dvh;
    overflow:hidden;
    touch-action:none;
    background:linear-gradient(var(--sky-hi), var(--sky) 55%, var(--sky-lo));
  }

  /* ---------- scenes ---------- */
  .scene{ position:absolute; inset:0; display:none; }
  .scene.active{ display:block; }

  /* ---------- HUD ---------- */
  #hud{
    position:absolute; top:0; left:0; right:0; z-index:50;
    display:flex; align-items:center; gap:1.5vmin;
    padding:2vmin 2.5vmin;
    padding-top:max(2vmin, env(safe-area-inset-top));
    pointer-events:none;
  }
  #hud > *{ pointer-events:auto; }
  .hudBtn{
    width:11vmin; height:11vmin; min-width:52px; min-height:52px;
    border:none; border-radius:50%;
    background:#fff; box-shadow:0 .8vmin 0 rgba(0,0,0,.15);
    font-size:5vmin; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .hudBtn:active{ transform:scale(.9); }
  #homeBtn{ display:none; }
  #game.in-world #homeBtn{ display:flex; }
  #starBar{
    flex:1; display:flex; justify-content:center; gap:1vmin;
    font-size:5vmin; filter:drop-shadow(0 .4vmin rgba(0,0,0,.15));
    pointer-events:none;
  }
  #starBar .st{ opacity:.35; transition:transform .2s, opacity .2s; }
  #starBar .st.on{ opacity:1; transform:scale(1.25); }

  /* ---------- shared scenery ---------- */
  .sun{
    position:absolute; top:6vmin; right:8vmin;
    width:15vmin; height:15vmin; border-radius:50%;
    border:none; padding:0;
    background:radial-gradient(circle at 35% 35%, #FFE88A, var(--sun));
    box-shadow:0 0 8vmin 2vmin rgba(255,210,63,.55);
    cursor:pointer; z-index:1;
  }
  .cloud{
    position:absolute; z-index:1;
    width:22vmin; height:8vmin; border-radius:8vmin;
    background:var(--cloud); opacity:.95;
    animation:drift linear infinite;
  }
  .cloud::before, .cloud::after{
    content:""; position:absolute; background:var(--cloud); border-radius:50%;
  }
  .cloud::before{ width:10vmin; height:10vmin; top:-4.5vmin; left:3.5vmin; }
  .cloud::after{ width:8vmin; height:8vmin; top:-3vmin; right:4vmin; }
  @keyframes drift{
    from{ transform:translateX(-30vw); }
    to{ transform:translateX(130vw); }
  }
  .ground{
    position:absolute; left:0; right:0; bottom:0; height:30%;
    z-index:2;
  }
  .hill{ position:absolute; border-radius:50% 50% 0 0; z-index:1; }

  .char{
    position:absolute; z-index:10;
    border:none; background:none; padding:0;
    line-height:1; cursor:pointer;
    font-family:var(--fun-font);
    filter:drop-shadow(0 1vmin 1vmin rgba(0,0,0,.2));
    animation:bob 2.4s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-1.2vmin); }
  }
  .char.jump{ animation:jump .55s ease-out; }
  @keyframes jump{
    0%{ transform:translateY(0) scale(1,1); }
    20%{ transform:translateY(.8vmin) scale(1.1,.85); }
    55%{ transform:translateY(-9vmin) scale(.95,1.1); }
    100%{ transform:translateY(0) scale(1,1); }
  }
  .char.stomp{ animation:stomp .6s ease-out; }
  @keyframes stomp{
    0%,100%{ transform:rotate(0); }
    25%{ transform:rotate(-8deg) translateY(-3vmin); }
    55%{ transform:rotate(4deg) translateY(0); }
    75%{ transform:rotate(-2deg); }
  }
  .char.wiggle, .wiggle{ animation:wiggle .45s ease-in-out; }
  @keyframes wiggle{
    0%,100%{ transform:rotate(0); }
    25%{ transform:rotate(-14deg); }
    50%{ transform:rotate(12deg); }
    75%{ transform:rotate(-8deg); }
  }
  .char.lunge{ animation:lunge .5s ease-out; }
  @keyframes lunge{
    0%,100%{ transform:translateX(0) scale(1); }
    35%{ transform:translateX(-7vmin) scale(1.12); }
  }
  .shake{ animation:shake .6s ease-in-out; }
  @keyframes shake{
    0%,100%{ transform:translate(0,0); }
    20%{ transform:translate(1vmin,-.5vmin); }
    40%{ transform:translate(-1vmin,.5vmin); }
    60%{ transform:translate(.8vmin,.4vmin); }
    80%{ transform:translate(-.6vmin,-.4vmin); }
  }

  /* drive-by vehicles */
  .drives{
    position:absolute; bottom:3%; left:0; z-index:12;
    border:none; background:none; padding:0; cursor:pointer;
    font-size:16vmin; line-height:1;
    filter:drop-shadow(0 1vmin 1vmin rgba(0,0,0,.2));
    animation:drive var(--dur,14s) linear infinite;
  }
  .drives > span{ display:inline-block; }
  @keyframes drive{
    from{ transform:translateX(-40vw) scaleX(-1); }
    to{ transform:translateX(115vw) scaleX(-1); }
  }
  .drives > span.lights{ animation:lights .25s steps(2) 6; }
  @keyframes lights{
    from{ filter:drop-shadow(0 0 3vmin #FF3B3B) brightness(1.3); }
    to{ filter:drop-shadow(0 0 3vmin #3B8CFF) brightness(1); }
  }

  /* ---------- HOME ---------- */
  #home .ground{
    background:linear-gradient(var(--grass), var(--grass-dk));
    border-radius:100% 100% 0 0 / 40% 40% 0 0;
    height:10%;
  }
  #title{
    position:absolute; top:3.5%; left:0; right:0;
    text-align:center; z-index:5;
    font-size:min(7vmin, 42px); font-weight:900;
    letter-spacing:.4vmin;
    color:#fff;
    text-shadow:0 .8vmin 0 var(--ink), 0 0 3vmin rgba(41,51,92,.25);
  }
  #title span{ display:inline-block; animation:titlebounce 1.8s ease-in-out infinite; }
  @keyframes titlebounce{
    0%,100%{ transform:translateY(0) rotate(-2deg); }
    50%{ transform:translateY(-1.5vmin) rotate(2deg); }
  }
  #worlds{
    position:absolute; left:2.5vmin; right:2.5vmin; top:13%; bottom:2.5vmin;
    display:grid; grid-template-columns:repeat(3,1fr); grid-auto-rows:1fr;
    gap:2vmin; z-index:5;
  }
  @media (orientation:landscape){
    #worlds{ grid-template-columns:repeat(4,1fr); top:17%; }
  }
  .worldBtn{
    border:none; cursor:pointer;
    border-radius:4vmin;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:.5vmin;
    font-family:var(--fun-font); font-weight:900;
    font-size:clamp(11px, 3.2vmin, 20px); color:#fff;
    text-shadow:0 .4vmin 0 rgba(0,0,0,.25);
    box-shadow:0 1vmin 0 rgba(0,0,0,.2);
    transition:transform .12s;
    overflow:hidden;
  }
  .worldBtn:active{ transform:scale(.92); }
  .worldBtn .big{
    font-size:clamp(26px, 8.5vmin, 52px); line-height:1.15;
    filter:drop-shadow(0 .6vmin .6vmin rgba(0,0,0,.2));
  }
  #btnPups{ background:linear-gradient(#FF7B7F, var(--cherry)); }
  #btnDinos{ background:linear-gradient(#5BC97E, var(--jungle-dk)); }
  #btnTrucks{ background:linear-gradient(#F2A541, #D97E1E); }
  #btnDiggers{ background:linear-gradient(#FFD23F, #E0A200); }
  #btnTrains{ background:linear-gradient(#7B8CDE, #4A5AB8); }
  #btnPlanes{ background:linear-gradient(#90B8D8, #5878A0); }
  #btnSpace{ background:linear-gradient(#5D5FEF, #2E2E8F); }
  #btnFarm{ background:linear-gradient(#E0684B, #B23A2A); }
  #btnOcean{ background:linear-gradient(#54B8E8, #2380B8); }
  #btnBalloons{ background:linear-gradient(#F291C1, #D9558F); }
  #btnMusic{ background:linear-gradient(#4FC9C4, #248F8A); }
  #btnFireworks{ background:linear-gradient(#6A4FC9, #3A2E8F); }

  /* ---------- PUPS ---------- */
  #pups .ground{ background:linear-gradient(var(--grass), var(--grass-dk)); }
  #pups .hill{ background:#6ECB5A; width:70vmin; height:26vmin; left:-12vmin; bottom:22%; }
  #pups .hill.h2{ background:#4FAE45; width:90vmin; height:30vmin; left:auto; right:-20vmin; bottom:20%; }
  .pup{ font-size:15vmin; }
  .pup .hat{
    position:absolute; top:-4.5vmin; left:50%; transform:translateX(-50%) rotate(-10deg);
    font-size:7vmin;
  }
  #tree{ font-size:30vmin; right:2%; bottom:24%; animation:none; }
  #kitty{
    font-size:8vmin; right:12%; bottom:52%;
    transition:bottom 1s cubic-bezier(.3,1.4,.5,1), right 1s;
    z-index:11;
  }
  #kitty.down{ bottom:16%; right:22%; }
  #bone{ font-size:9vmin; left:38%; bottom:8%; animation:none; }

  /* ---------- DINOS ---------- */
  #dinos{ background:linear-gradient(#A8E0FF, #C9F0D8 70%); }
  #dinos .ground{ background:linear-gradient(var(--jungle), var(--jungle-dk)); }
  #dinos .hill{ background:#5FBE82; width:80vmin; height:24vmin; left:-15vmin; bottom:24%; }
  #volcano{
    position:absolute; right:4%; bottom:26%;
    width:38vmin; height:30vmin; z-index:3;
    border:none; padding:0; cursor:pointer;
    clip-path:polygon(50% 0, 100% 100%, 0 100%);
    background:linear-gradient(#8B5A3C, #5F3A22);
  }
  #volcano::before{
    content:""; position:absolute; top:0; left:32%; width:36%; height:16%;
    background:radial-gradient(#FF6B35, #D93800);
    border-radius:0 0 50% 50%;
  }
  .palm{ font-size:20vmin; animation:none; z-index:4; }
  #trex{ font-size:22vmin; left:6%; bottom:10%; transform:scaleX(-1); animation:flipbob 2.4s ease-in-out infinite; }
  @keyframes flipbob{
    0%,100%{ transform:scaleX(-1) translateY(0); }
    50%{ transform:scaleX(-1) translateY(-1.2vmin); }
  }
  #trex.stomp{ animation:stompflip .6s ease-out; }
  @keyframes stompflip{
    0%,100%{ transform:scaleX(-1) rotate(0); }
    25%{ transform:scaleX(-1) rotate(8deg) translateY(-3vmin); }
    55%{ transform:scaleX(-1) rotate(-4deg); }
    75%{ transform:scaleX(-1) rotate(2deg); }
  }
  #bronto{ font-size:20vmin; left:42%; bottom:14%; }
  #egg{ font-size:11vmin; left:30%; bottom:6%; }
  #egg .baby{ font-size:10vmin; }

  /* ---------- TRUCKS ---------- */
  #trucks{ background:linear-gradient(#FFD9A0, #FFB86B 60%); }
  #trucks .ground{ background:linear-gradient(var(--dirt), var(--dirt-dk)); height:34%; }
  .bunting{
    position:absolute; top:0; left:0; right:0; height:7vmin; z-index:3;
    background:
      linear-gradient(45deg, transparent 50%, #FF5A5F 50%) 0 0/7vmin 7vmin repeat-x,
      linear-gradient(-45deg, transparent 50%, #4AA8E8 50%) 3.5vmin 0/7vmin 7vmin repeat-x;
    opacity:.9;
  }
  .truck{
    position:absolute; z-index:10;
    width:26vmin; height:17vmin;
    border:none; background:none; padding:0; cursor:pointer;
    animation:idle .9s ease-in-out infinite;
    transform-origin:80% 100%;
  }
  @keyframes idle{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-.7vmin); }
  }
  .truck .cab{
    position:absolute; left:4%; right:4%; top:0; height:52%;
    background:var(--tc, var(--cherry));
    border-radius:2.5vmin 5.5vmin 1.5vmin 1.5vmin;
    box-shadow:inset 0 -1.4vmin rgba(0,0,0,.2), 0 .6vmin .8vmin rgba(0,0,0,.2);
  }
  .truck .cab::after{
    content:""; position:absolute; right:10%; top:14%;
    width:26%; height:46%;
    background:linear-gradient(#EAF9FF, #BFE9FF);
    border-radius:1.2vmin;
  }
  .truck .cab::before{
    content:"★"; position:absolute; left:12%; top:18%;
    font-size:4.5vmin; color:rgba(255,255,255,.9);
  }
  .truck .wheel{
    position:absolute; bottom:0; width:10vmin; height:10vmin; border-radius:50%;
    background:radial-gradient(circle, #9aa 0 24%, #222 26% 100%);
    box-shadow:inset 0 0 0 1.1vmin #111, 0 .5vmin .6vmin rgba(0,0,0,.3);
  }
  .truck .w1{ left:0; } .truck .w2{ right:0; }
  .truck.wheelie{ animation:wheelie .8s ease-out; }
  @keyframes wheelie{
    0%{ transform:rotate(0) translateY(0); }
    30%{ transform:rotate(-24deg) translateY(-1vmin); }
    55%{ transform:rotate(-18deg); }
    75%{ transform:rotate(3deg) translateY(0); }
    100%{ transform:rotate(0); }
  }
  .truck.bigjump{ animation:bigjump 1s ease-out; }
  @keyframes bigjump{
    0%{ transform:translateY(0) rotate(0); }
    35%{ transform:translateY(-16vmin) rotate(-14deg); }
    65%{ transform:translateY(-10vmin) rotate(8deg); }
    85%{ transform:translateY(.6vmin) rotate(0) scale(1.04,.92); }
    100%{ transform:translateY(0) scale(1,1); }
  }
  #ramp{
    position:absolute; right:4%; bottom:10%; z-index:9;
    width:24vmin; height:13vmin;
    border:none; padding:0; cursor:pointer;
    clip-path:polygon(0 100%, 100% 0, 100% 100%);
    background:repeating-linear-gradient(45deg, #F2A541 0 2.4vmin, #D97E1E 2.4vmin 4.8vmin);
    box-shadow:0 .6vmin 0 rgba(0,0,0,.2);
  }
  #tires{
    position:absolute; left:3%; bottom:12%; z-index:9;
    border:none; background:none; padding:0; cursor:pointer;
    display:flex; flex-direction:column; gap:.6vmin;
  }
  #tires .tire{
    width:11vmin; height:4.5vmin; border-radius:2.5vmin;
    background:radial-gradient(ellipse at center, #555 0 30%, #1d1d1d 34% 100%);
    box-shadow:inset 0 -1vmin rgba(0,0,0,.4);
  }
  #tires.squash{ animation:squash .5s ease-out; }
  @keyframes squash{
    0%,100%{ transform:scale(1,1); }
    35%{ transform:scale(1.2,.7); }
    70%{ transform:scale(.95,1.1); }
  }

  /* ---------- DIGGERS ---------- */
  #diggers{ background:linear-gradient(#BDE8FF, #9AD4F5 60%); }
  #diggers .ground{ background:linear-gradient(var(--dirt), var(--dirt-dk)); height:32%; }
  #crane{ font-size:30vmin; right:6%; bottom:26%; animation:none; z-index:5; }
  #digger{ font-size:17vmin; left:5%; bottom:12%; }
  #digger > span{ display:inline-block; transform:scaleX(-1); }
  .cone{ font-size:8vmin; }
  #tower{
    position:absolute; left:44%; bottom:13%; width:17vmin; z-index:10;
    border:none; background:none; padding:0; cursor:pointer;
    display:grid; grid-template-columns:1fr 1fr; gap:.6vmin;
  }
  #tower .block{
    height:5.5vmin; border-radius:.8vmin;
    box-shadow:inset 0 -1vmin rgba(0,0,0,.18), 0 .4vmin .4vmin rgba(0,0,0,.15);
  }

  /* ---------- TRAINS ---------- */
  #trains .ground{ background:linear-gradient(var(--grass), var(--grass-dk)); height:26%; }
  #track{
    position:absolute; left:0; right:0; bottom:13%; height:5vmin; z-index:4;
    background:
      linear-gradient(transparent 30%, #4A4A4A 30% 42%, transparent 42% 62%, #4A4A4A 62% 74%, transparent 74%),
      repeating-linear-gradient(90deg, #8B5E3C 0 2.5vmin, transparent 2.5vmin 8vmin);
  }
  #train{ bottom:14%; font-size:13vmin; }
  #tunnel{
    position:absolute; right:-2vmin; bottom:13%; z-index:13;
    width:26vmin; height:26vmin;
    border:none; padding:0; cursor:pointer;
    background:linear-gradient(#7A9B58, #5C7A42);
    border-radius:13vmin 13vmin 0 0;
  }
  #tunnel::after{
    content:""; position:absolute; left:15%; bottom:0;
    width:70%; height:76%;
    background:#3A3128;
    border-radius:9vmin 9vmin 0 0;
  }
  #crossing{
    position:absolute; left:12%; bottom:23%; z-index:6;
    width:14vmin; height:26vmin;
    border:none; background:none; padding:0; cursor:pointer;
  }
  #crossing .xpole{
    position:absolute; left:50%; transform:translateX(-50%); bottom:0;
    width:1.8vmin; height:100%;
    background:#8A8F98; border-radius:.5vmin;
  }
  #crossing .xsign{
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:9vmin; height:9vmin; border-radius:50%;
    background:#E2574C; color:#fff;
    font-size:5.5vmin; font-weight:900; line-height:9vmin; text-align:center;
    box-shadow:0 .4vmin 0 rgba(0,0,0,.2);
  }
  #crossing .xlights{
    position:absolute; top:10.5vmin; left:50%; transform:translateX(-50%);
    display:flex; gap:1.2vmin;
  }
  #crossing .light{
    width:3.6vmin; height:3.6vmin; border-radius:50%;
    background:#5a1f1f; border:.5vmin solid #444;
  }
  #crossing.ring .light{ animation:blinkR .4s steps(1) 5; }
  #crossing.ring .light.l2{ animation-delay:.2s; }
  @keyframes blinkR{
    0%{ background:#FF3B3B; box-shadow:0 0 2.5vmin #FF3B3B; }
    50%{ background:#5a1f1f; box-shadow:none; }
  }

  /* ---------- PLANES ---------- */
  #planes{ background:linear-gradient(#BDE8FF, #9AD9F7 60%); }
  #planes .ground{ background:linear-gradient(#7B8494, #5B6472); height:22%; }
  #planes .ground::after{
    content:""; position:absolute; left:0; right:0; top:44%; height:1.6vmin;
    background:repeating-linear-gradient(90deg, #FFD23F 0 6vmin, transparent 6vmin 12vmin);
  }
  #plane{ font-size:16vmin; left:8%; bottom:15%; }
  #heli{ font-size:13vmin; right:16%; top:22%; }
  #luggage{ font-size:9vmin; left:48%; bottom:9%; }
  #atc{
    position:absolute; right:4%; bottom:20%; z-index:5;
    width:13vmin; height:28vmin;
    border:none; padding:0; cursor:pointer;
    background:linear-gradient(#EDE8DC, #D4CCB8);
    clip-path:polygon(20% 100%, 30% 30%, 70% 30%, 80% 100%);
  }
  #atc::before{
    content:""; position:absolute; top:0; left:6%;
    width:88%; height:32%;
    background:linear-gradient(#BFE9FF, #8FCBEB);
    border-radius:2vmin;
    box-shadow:0 .5vmin 0 rgba(0,0,0,.15);
  }

  /* ---------- SPACE ---------- */
  #space{ background:linear-gradient(#141A3F, #2C2260 55%, #3A2E6E); }
  #space .ground{
    background:linear-gradient(#B9BFC9, #8E95A3);
    height:22%;
    border-radius:100% 100% 0 0 / 30% 30% 0 0;
  }
  .tw{
    position:absolute; border-radius:50%; background:#fff;
    width:.8vmin; height:.8vmin; min-width:3px; min-height:3px;
    animation:twk 2.2s ease-in-out infinite;
  }
  @keyframes twk{
    0%,100%{ opacity:.25; }
    50%{ opacity:1; }
  }
  #moon{
    position:absolute; top:16vmin; left:5vmin;
    width:12vmin; height:12vmin; border-radius:50%;
    pointer-events:none; z-index:2;
    background:
      radial-gradient(circle at 62% 60%, #C3C7B4 0 8%, transparent 9%),
      radial-gradient(circle at 40% 72%, #C3C7B4 0 6%, transparent 7%),
      radial-gradient(circle at 70% 30%, #C3C7B4 0 5%, transparent 6%),
      radial-gradient(circle at 38% 35%, #FDFDF2, #D9DCCB 70%);
    box-shadow:0 0 6vmin rgba(255,255,240,.35);
  }
  #findBar{
    position:absolute; top:13vmin; left:50%; transform:translateX(-50%);
    z-index:11;
    display:flex; align-items:center; gap:2vmin;
    padding:1.2vmin 3.5vmin;
    background:rgba(255,255,255,.14);
    border:.6vmin dashed rgba(255,255,255,.55);
    border-radius:5vmin;
  }
  #findBar .mag{ font-size:6.5vmin; line-height:1; }
  #findTarget{
    font-size:11vmin; line-height:1.15;
    animation:targetPulse 1.6s ease-in-out infinite;
  }
  @keyframes targetPulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.15); }
  }
  #findList{
    position:absolute; left:50%; transform:translateX(-50%); bottom:2vmin;
    z-index:11;
    display:flex; align-items:center; gap:1.5vmin;
    padding:1.2vmin 2.2vmin;
    background:rgba(16,22,54,.8);
    border:.5vmin dashed rgba(255,255,255,.55);
    border-radius:5vmin;
    max-width:96vw;

  function burst(x, y, emojis, n){
    n = n || 8;
    for(var i=0;i<n;i++){
      var p = document.createElement('span');
      p.className = 'p';
      var isDot = Math.random() < 0.35 || !emojis.length;

        var s = 1 + Math.random()*1.6;
        p.style.width = s+'vmin'; p.style.height = s+'vmin';
        p.style.background = COLORS[Math.floor(Math.random()*COLORS.length)];
      } else {
        p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        p.style.fontSize = (3 + Math.random()*3)+'vmin';
      }
      p.style.left = x+'px'; p.style.top = y+'px';
      fx.appendChild(p);
      var ang = Math.random()*Math.PI*2;
      var dist = 40 + Math.random()*110;
      var dx = Math.cos(ang)*dist, dy = Math.sin(ang)*dist - 60;
      p.animate([

        { transform:'translate(calc(-50% + '+dx+'px), calc(-50% + '+dy+'px)) scale(1.15) rotate('+(Math.random()*180-90)+'deg)', opacity:0 }
      ], { duration: 550 + Math.random()*350, easing:'cubic-bezier(.2,.8,.4,1)' })

    ['🐮','🐷','🐔','🐑','🦆','🐴','🐐','🌾'],
    ['🐶','🐱','🐰','🦊','🐻','🐼','🐨','🐸'],
    ['🚒','🚓','🚑','🚌','🚜','🚛','🏎️','🚁'],
    ['🐳','🦈','🐙','🐠','🦀','🐬','🐡','⛵'],
    ['🍎','🍌','🍇','🍓','🍪','🧁','🍕','🍦'],
    ['🐝','🦋','🐞','🐌','🐜','🦗','🐛','🌸']
  ];
  var findField = $('#findField'), findTargetEl = $('#findTarget');
  var findList = $('#findList'), lvlBadge = $('#lvlBadge'), lvlToast = $('#lvlToast');
  var findBusy = false, lastPool = -1, targets = [];
  var level = 1;
  try{ level = Math.max(1, parseInt(localStorage.getItem('wrv-find-level'), 10) || 1); }catch(err){}
  function saveLevel(){
    try{ localStorage.setItem('wrv-find-level', String(level)); }catch(err){}
  }
  function shuffle(a){
    for(var i=a.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }
  function updateFindUI(){
    lvlBadge.textContent = '⭐ ' + level;
    var nextEm = null;
    targets.forEach(function(t){ if(!nextEm && !t.found) nextEm = t.em; });
    findTargetEl.textContent = nextEm || '🎉';
    targets.forEach(function(t){
      t.slot.classList.toggle('done', t.found);
      t.slot.classList.toggle('now', !t.found && t.em === nextEm);
    });
  }
  function newFindRound(){
    findBusy = false;
    findField.innerHTML = '';
    $$('#findList .fslot').forEach(function(s){ s.remove(); });
    var pi;
    do{ pi = Math.floor(Math.random()*POOLS.length); }while(pi === lastPool);
    lastPool = pi;
    var pool = POOLS[pi].slice();
    shuffle(pool);
    var tc = Math.min(3 + Math.floor((level-1)/2), 5);       // targets on the list
    var total = Math.min(24 + (level-1)*6, 60);              // items on the field
    targets = pool.slice(0, tc).map(function(em){
      var slot = document.createElement('span');
      slot.className = 'fslot';
      slot.textContent = em;
      findList.appendChild(slot);
      return { em: em, found: false, slot: slot };
    });
    var others = pool.slice(tc);
    var items = targets.map(function(t){ return t.em; });
    for(var i=items.length;i<total;i++) items.push(others[Math.floor(Math.random()*others.length)]);
    shuffle(items);
    var cols = total <= 24 ? 6 : (total <= 42 ? 8 : 9);
    var rows = Math.ceil(total / cols);
    var sizeCls = total <= 24 ? '' : (total <= 42 ? ' small' : ' tiny');
    var cells = [];
    for(var r=0;r<rows;r++) for(var c=0;c<cols;c++) cells.push({ r:r, c:c });
    shuffle(cells);
    items.forEach(function(em, i){
      var cell = cells[i];
      var b = document.createElement('button');
      b.className = 'fitem' + sizeCls;
      b.textContent = em;
      b.setAttribute('aria-label','find item');
      b.style.left = (cell.c*(100/cols) + 2 + Math.random()*(100/cols)*0.35) + '%';
      b.style.top = (cell.r*(100/rows) + 2 + Math.random()*(100/rows)*0.3) + '%';
      b.style.animationDelay = (-Math.random()*2.4)+'s';
      findField.appendChild(b);
      b.addEventListener('pointerdown', function(e){
        e.preventDefault(); e.stopPropagation();
        ctx();
        if(findBusy) return;
        var t = null;
        targets.forEach(function(tt){ if(!tt.found && tt.em === em) t = tt; });
        if(t){
          t.found = true;
          var c0 = center(b);
          burst(c0.x, c0.y, ['⭐','✨','🌟'], 12);
          b.classList.add('found');
          star();
          var left = targets.filter(function(tt){ return !tt.found; }).length;
          if(left === 0){
            findBusy = true;
            S.tada();
            level++;
            saveLevel();
            updateFindUI();
            setTimeout(function(){
              lvlToast.querySelector('.msg').textContent = 'LEVEL ' + level + '! 🚀';
              lvlToast.classList.add('show');
              confettiRain(16);
              setTimeout(function(){
                lvlToast.classList.remove('show');
                newFindRound();
              }, 1600);
            }, 500);
          } else {
            S.sparkle();
            updateFindUI();
          }
        } else {
          tone(220,140,.18,'square',.14);
          replay(b, 'wiggle');
        }
      });
    });
    updateFindUI();
  }
  newFindRound();
  $('#btnSpace').addEventListener('pointerdown', newFindRound);

  /* ============ FARM ============ */
  function critter(sel, snd, emojis){
    tap($(sel), function(e, el){
      snd();
      replay(el, Math.random() < 0.5 ? 'jump' : 'wiggle');
      burst(e.clientX, e.clientY, emojis, 7);
    });
  }
  critter('#cow', S.moo, ['⭐','🤍']);
  critter('#pig', S.oink, ['💗','⭐']);
  critter('#hen', S.cluck, ['🥚','⭐']);
  critter('#sheep', S.baa, ['🤍','☁️']);
  critter('#duck', S.quack, ['💦','⭐']);
  var farmSounds = [S.moo, S.oink, S.cluck, S.baa, S.quack];
  tap($('#barn'), function(e, el){
    farmSounds[Math.floor(Math.random()*farmSounds.length)]();
    replay(el, 'wiggle');
    burst(e.clientX, e.clientY, ['🌾','⭐'], 7);
  });
  tap($('#tractorF'), function(e, el){
    S.putt();
    replay(el.firstElementChild, 'wiggle');
    burst(e.clientX, e.clientY, ['💨'], 5);
  });

  /* ============ OCEAN ============ */
  var whale = $('#whale');
  tap(whale, function(e, el){
    S.whale();
    replay(el, 'jump');
    var r = el.getBoundingClientRect();
    burst(r.left + r.width/2, r.top, ['💦','💧'], 10);
  });
  tap($('#shark'), function(e, el){
    S.chomp();
    replay(el, 'lunge');
    burst(e.clientX, e.clientY, ['💦','💥'], 7);
  });
  tap($('#octo'), function(e, el){
    S.bubbly();
    replay(el, 'wiggle');
    burst(e.clientX, e.clientY, ['💜','💧'], 7);
  });
  critter('#fish1', S.blub, ['💧','⚪']);
  critter('#fish2', S.blub, ['💧','⚪']);
  tap($('#crab'), function(e, el){
    S.clicks();
    replay(el, 'wiggle');
    burst(e.clientX, e.clientY, ['✨','💧'], 5);
  });
  tap($('#boat'), function(e, el){
    S.foghorn();
    replay(el.firstElementChild, 'wiggle');
    burst(e.clientX, e.clientY, ['💦','💨'], 6);
  });
  var oceanScene = $('#ocean');
  function spawnBubble(){
    var b = document.createElement('button');
    b.className = 'bubble';
    b.setAttribute('aria-label','bubble');
    var sz = 6 + Math.random()*7;
    b.style.width = sz+'vmin'; b.style.height = sz+'vmin';
    b.style.minWidth = '44px'; b.style.minHeight = '44px';
    b.style.left = (5 + Math.random()*83)+'%';
    b.style.top = '100%';
    oceanScene.appendChild(b);
    var rise = b.animate([
      { transform:'translate(0,0)' },
      { transform:'translate('+(Math.random()*10-5)+'vmin, -'+(window.innerHeight + 200)+'px)' }
    ], { duration: 4500 + Math.random()*3500, easing:'linear' });
    rise.onfinish = function(){ b.remove(); };
    b.addEventListener('pointerdown', function(e){
      e.preventDefault(); e.stopPropagation();
      ctx();
      tone(700,1400,.07,'sine',.16);
      var c = center(b);
      burst(c.x, c.y, ['💧'], 5);
      b.remove();
      star();
    });
  }
  setInterval(function(){
    if(oceanScene.classList.contains('active') &&
       oceanScene.querySelectorAll('.bubble').length < 5){
      spawnBubble();
    }
  }, 900);

  /* ============ BALLOONS ============ */
  var balloonScene = $('#balloons');
  function spawnBalloon(){
    var b = document.createElement('button');
    b.className = 'balloon';
    b.setAttribute('aria-label','balloon');
    b.style.setProperty('--bc', COLORS[Math.floor(Math.random()*COLORS.length)]);
    b.style.left = (5 + Math.random()*78)+'%';
    b.style.top = '100%';
    b.innerHTML = '<span class="body"></span>';
    balloonScene.appendChild(b);
    var rise = b.animate([
      { transform:'translate(0,0)' },
      { transform:'translate('+(Math.random()*12-6)+'vmin, -'+(window.innerHeight + 400)+'px)' }
    ], { duration: 5500 + Math.random()*4000, easing:'linear' });
    rise.onfinish = function(){ b.remove(); };
    b.addEventListener('pointerdown', function(e){
      e.preventDefault(); e.stopPropagation();
      ctx();
      S.bang();
      var c = center(b);
      burst(c.x, c.y, ['🎉','✨'], 9);
      b.remove();
      star();
    });
  }
  setInterval(function(){
    if(balloonScene.classList.contains('active') &&
       balloonScene.querySelectorAll('.balloon').length < 6){
      spawnBalloon();
    }
  }, 700);
  $('#btnBalloons').addEventListener('pointerdown', function(){
    for(var j=0;j<3;j++) setTimeout(spawnBalloon, j*250);
  });

  /* ============ MUSIC ============ */
  var xylo = $('#xylo');
  var NOTES = [
    { f:523.25, c:'#FF5A5F', h:100 },
    { f:587.33, c:'#F2A541', h:91 },
    { f:659.25, c:'#FFD23F', h:82 },
    { f:783.99, c:'#6BCB4F', h:73 },
    { f:880.00, c:'#4AA8E8', h:64 },
    { f:1046.5, c:'#B07CE8', h:55 }
  ];
  NOTES.forEach(function(n){
    var bar = document.createElement('button');
    bar.className = 'bar';
    bar.style.background = 'linear-gradient(' + n.c + ', ' + n.c + ')';
    bar.style.height = n.h + '%';
    bar.setAttribute('aria-label','xylophone bar');
    xylo.appendChild(bar);
    tap(bar, function(e){
      S.note(n.f);
      replay(bar, 'ping');
      burst(e.clientX, e.clientY, ['🎵','🎶'], 4);
    });
  });
  tap($('#drum'), function(e, el){
    S.thump();
    replay(el, 'jump');
    burst(e.clientX, e.clientY, ['🎵','💥'], 6);
  });
  tap($('#bongo'), function(e, el){
    S.bongo();
    replay(el, 'jump');
    burst(e.clientX, e.clientY, ['🎵','🎶'], 5);
  });
  tap($('#guitar'), function(e, el){
    S.guitar();
    replay(el, 'wiggle');
    burst(e.clientX, e.clientY, ['🎵','🎶'], 5);
  });
  tap($('#piano'), function(e, el){
    S.piano();
    replay(el, 'jump');
    burst(e.clientX, e.clientY, ['🎵','🎶'], 5);
  });
  tap($('#sax'), function(e, el){
    S.sax();
    replay(el, 'wiggle');
    burst(e.clientX, e.clientY, ['🎵','🎷'], 5);
  });
  tap($('#violin'), function(e, el){
    S.violin();
    replay(el, 'wiggle');
    burst(e.clientX, e.clientY, ['🎵','🎶'], 5);
  });
  tap($('#bell'), function(e, el){
    S.ding();
    replay(el, 'wiggle');
    burst(e.clientX, e.clientY, ['🎵','✨'], 6);
  });
  tap($('#horn2'), function(e, el){
    S.horn();
    replay(el, 'wiggle');
    burst(e.clientX, e.clientY, ['🎵','🎶'], 6);
  });

  /* ============ FIREWORKS ============ */
  makeStars($('#fwstars'), 20);
  var fwScene = $('#fireworks');
  function firework(x, y){
    var col = COLORS[Math.floor(Math.random()*COLORS.length)];
    var streak = document.createElement('span');
    streak.className = 'p dot';
    streak.style.width = '1.4vmin'; streak.style.height = '1.4vmin';
    streak.style.background = '#fff';
    streak.style.left = x+'px'; streak.style.top = window.innerHeight+'px';
    fx.appendChild(streak);
    S.whoosh();
    streak.animate(
      [{ transform:'translateY(0)' }, { transform:'translateY('+(y - window.innerHeight)+'px)' }],
      { duration:480, easing:'ease-out' }
    ).onfinish = function(){
      streak.remove();
      S.boom();
      var flash = document.createElement('span');
      flash.className = 'p dot';
      flash.style.width = '8vmin'; flash.style.height = '8vmin';
      flash.style.background = '#fff';
      flash.style.left = x+'px'; flash.style.top = y+'px';
      flash.style.boxShadow = '0 0 8vmin 4vmin rgba(255,255,255,.5)';
      fx.appendChild(flash);
      flash.animate(
        [{ transform:'translate(-50%,-50%) scale(.3)', opacity:1 },
         { transform:'translate(-50%,-50%) scale(2.2)', opacity:0 }],
        { duration:320, easing:'ease-out' }
      ).onfinish = function(){ flash.remove(); };
      for(var i=0;i<18;i++){
        var p = document.createElement('span');
        p.className = 'p dot';
        var s = 1 + Math.random()*1.4;
        p.style.width = s+'vmin'; p.style.height = s+'vmin';
        p.style.background = (i % 4 === 0) ? '#FFF6D6' : col;
        p.style.left = x+'px'; p.style.top = y+'px';
        fx.appendChild(p);
        var ang = (i/18)*Math.PI*2 + Math.random()*.3;
        var dist = 70 + Math.random()*90;
        var dx = Math.cos(ang)*dist, dy = Math.sin(ang)*dist;
        p.animate([
          { transform:'translate(-50%,-50%)', opacity:1 },
          { transform:'translate(calc(-50% + '+dx+'px), calc(-50% + '+(dy+45)+'px)) scale(.5)', opacity:0 }
        ], { duration: 850 + Math.random()*350, easing:'cubic-bezier(.1,.8,.5,1)' })
        .onfinish = function(){ this.effect.target.remove(); };
      }
    };
  }
  fwScene.addEventListener('pointerdown', function(e){
    ctx();
    firework(e.clientX, Math.max(e.clientY, window.innerHeight*0.12));
    star();
  });
  setInterval(function(){
    if(fwScene.classList.contains('active')){
      firework(
        window.innerWidth*(0.15 + Math.random()*0.7),
        window.innerHeight*(0.15 + Math.random()*0.35)
      );
    }
  }, 3600);

  /* ============ offline support ============ */
  if('serviceWorker' in navigator && location.protocol === 'https:'){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  }

})();
</script>
</body>
</html>
