<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#6FC7F5">
<title>Woof! Roar! Vroom!</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
<style>
  :root{
    --sky-hi:#BDE8FF; --sky:#6FC7F5; --sky-lo:#8FD4FA;
    --grass:#5BBB4E; --grass-dk:#3E9B3C;
    --jungle:#4CAF6D; --jungle-dk:#2E7D4F;
    --dirt:#C98A4B; --dirt-dk:#A96B31;
    --sun:#FFD23F; --cherry:#FF5A5F; --ink:#29335C;
    --cloud:#FFFFFF;
    --fun-font: ui-rounded, "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Segoe UI", sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; overflow:hidden; }
  body{
    font-family:var(--fun-font);
    color:var(--ink);
    user-select:none; -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
  }
  #game{
    position:fixed; inset:0;
    height:100vh; height:100dvh;
    overflow:hidden;
    touch-action:none;
    background:linear-gradient(var(--sky-hi), var(--sky) 55%, var(--sky-lo));
  }

  /* ---------- scenes ---------- */
  .scene{ position:absolute; inset:0; display:none; }
  .scene.active{ display:block; }

  /* ---------- HUD ---------- */
  #hud{
    position:absolute; top:0; left:0; right:0; z-index:50;
    display:flex; align-items:center; gap:1.5vmin;
    padding:2vmin 2.5vmin;
    padding-top:max(2vmin, env(safe-area-inset-top));
    pointer-events:none;
  }
  #hud > *{ pointer-events:auto; }
  .hudBtn{
    width:11vmin; height:11vmin; min-width:52px; min-height:52px;
    border:none; border-radius:50%;
    background:#fff; box-shadow:0 .8vmin 0 rgba(0,0,0,.15);
    font-size:5vmin; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .hudBtn:active{ transform:scale(.9); }
  #homeBtn{ display:none; }
  #game.in-world #homeBtn{ display:flex; }
  #starBar{
    flex:1; display:flex; justify-content:center; gap:1vmin;
    font-size:5vmin; filter:drop-shadow(0 .4vmin rgba(0,0,0,.15));
    pointer-events:none;
  }
  #starBar .st{ opacity:.35; transition:transform .2s, opacity .2s; }
  #starBar .st.on{ opacity:1; transform:scale(1.25); }

  /* ---------- shared scenery ---------- */
  .sun{
    position:absolute; top:6vmin; right:8vmin;
    width:15vmin; height:15vmin; border-radius:50%;
    border:none; padding:0;
    background:radial-gradient(circle at 35% 35%, #FFE88A, var(--sun));
    box-shadow:0 0 8vmin 2vmin rgba(255,210,63,.55);
    cursor:pointer; z-index:1;
  }
  .cloud{
    position:absolute; z-index:1;
    width:22vmin; height:8vmin; border-radius:8vmin;
    background:var(--cloud); opacity:.95;
    animation:drift linear infinite;
  }
  .cloud::before, .cloud::after{
    content:""; position:absolute; background:var(--cloud); border-radius:50%;
  }
  .cloud::before{ width:10vmin; height:10vmin; top:-4.5vmin; left:3.5vmin; }
  .cloud::after{ width:8vmin; height:8vmin; top:-3vmin; right:4vmin; }
  @keyframes drift{
    from{ transform:translateX(-30vw); }
    to{ transform:translateX(130vw); }
  }
  .ground{
    position:absolute; left:0; right:0; bottom:0; height:30%;
    z-index:2;
  }
  .hill{ position:absolute; border-radius:50% 50% 0 0; z-index:1; }

  .char{
    position:absolute; z-index:10;
    border:none; background:none; padding:0;
    line-height:1; cursor:pointer;
    font-family:var(--fun-font);
    filter:drop-shadow(0 1vmin 1vmin rgba(0,0,0,.2));
    animation:bob 2.4s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-1.2vmin); }
  }
  .char.jump{ animation:jump .55s ease-out; }
  @keyframes jump{
    0%{ transform:translateY(0) scale(1,1); }
    20%{ transform:translateY(.8vmin) scale(1.1,.85); }
    55%{ transform:translateY(-9vmin) scale(.95,1.1); }
    100%{ transform:translateY(0) scale(1,1); }
  }
  .char.stomp{ animation:stomp .6s ease-out; }
  @keyframes stomp{
    0%,100%{ transform:rotate(0); }
    25%{ transform:rotate(-8deg) translateY(-3vmin); }
    55%{ transform:rotate(4deg) translateY(0); }
    75%{ transform:rotate(-2deg); }
  }
  .char.wiggle, .wiggle{ animation:wiggle .45s ease-in-out; }
  @keyframes wiggle{
    0%,100%{ transform:rotate(0); }
    25%{ transform:rotate(-14deg); }
    50%{ transform:rotate(12deg); }
    75%{ transform:rotate(-8deg); }
  }
  .char.lunge{ animation:lunge .5s ease-out; }
  @keyframes lunge{
    0%,100%{ transform:translateX(0) scale(1); }
    35%{ transform:translateX(-7vmin) scale(1.12); }
  }
  .shake{ animation:shake .6s ease-in-out; }
  @keyframes shake{
    0%,100%{ transform:translate(0,0); }
    20%{ transform:translate(1vmin,-.5vmin); }
    40%{ transform:translate(-1vmin,.5vmin); }
    60%{ transform:translate(.8vmin,.4vmin); }
    80%{ transform:translate(-.6vmin,-.4vmin); }
  }

  /* drive-by vehicles */
  .drives{
    position:absolute; bottom:3%; left:0; z-index:12;
    border:none; background:none; padding:0; cursor:pointer;
    font-size:16vmin; line-height:1;
    filter:drop-shadow(0 1vmin 1vmin rgba(0,0,0,.2));
    animation:drive var(--dur,14s) linear infinite;
  }
  .drives > span{ display:inline-block; }
  @keyframes drive{
    from{ transform:translateX(-40vw) scaleX(-1); }
    to{ transform:translateX(115vw) scaleX(-1); }
  }
  .drives > span.lights{ animation:lights .25s steps(2) 6; }
  @keyframes lights{
    from{ filter:drop-shadow(0 0 3vmin #FF3B3B) brightness(1.3); }
    to{ filter:drop-shadow(0 0 3vmin #3B8CFF) brightness(1); }
  }

  /* ---------- HOME ---------- */
  #home .ground{
    background:linear-gradient(var(--grass), var(--grass-dk));
    border-radius:100% 100% 0 0 / 40% 40% 0 0;
    height:10%;
  }
  #title{
    position:absolute; top:3.5%; left:0; right:0;
    text-align:center; z-index:5;
    font-size:min(7vmin, 42px); font-weight:900;
    letter-spacing:.4vmin;
    color:#fff;
    text-shadow:0 .8vmin 0 var(--ink), 0 0 3vmin rgba(41,51,92,.25);
  }
  #title span{ display:inline-block; animation:titlebounce 1.8s ease-in-out infinite; }
  @keyframes titlebounce{
    0%,100%{ transform:translateY(0) rotate(-2deg); }
    50%{ transform:translateY(-1.5vmin) rotate(2deg); }
  }
  #worlds{
    position:absolute; left:2.5vmin; right:2.5vmin; top:13%; bottom:2.5vmin;
    display:grid; grid-template-columns:repeat(3,1fr); grid-auto-rows:1fr;
    gap:2vmin; z-index:5;
  }
  @media (orientation:landscape){
    #worlds{ grid-template-columns:repeat(4,1fr); top:17%; }
  }
  .worldBtn{
    border:none; cursor:pointer;
    border-radius:4vmin;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:.5vmin;
    font-family:var(--fun-font); font-weight:900;
    font-size:clamp(11px, 3.2vmin, 20px); color:#fff;
    text-shadow:0 .4vmin 0 rgba(0,0,0,.25);
    box-shadow:0 1vmin 0 rgba(0,0,0,.2);
    transition:transform .12s;
    overflow:hidden;
  }
  .worldBtn:active{ transform:scale(.92); }
  .worldBtn .big{
    font-size:clamp(26px, 8.5vmin, 52px); line-height:1.15;
    filter:drop-shadow(0 .6vmin .6vmin rgba(0,0,0,.2));
  }
  #btnPups{ background:linear-gradient(#FF7B7F, var(--cherry)); }
  #btnDinos{ background:linear-gradient(#5BC97E, var(--jungle-dk)); }
  #btnAnimals{ background:linear-gradient(#C89B6C, #8F6A3F); }
  #btnTrucks{ background:linear-gradient(#F2A541, #D97E1E); }
  #btnDiggers{ background:linear-gradient(#FFD23F, #E0A200); }
  #btnTrains{ background:linear-gradient(#7B8CDE, #4A5AB8); }
  #btnPlanes{ background:linear-gradient(#90B8D8, #5878A0); }
  #btnSpace{ background:linear-gradient(#5D5FEF, #2E2E8F); }
  #btnFarm{ background:linear-gradient(#E0684B, #B23A2A); }
  #btnOcean{ background:linear-gradient(#54B8E8, #2380B8); }
  #btnBalloons{ background:linear-gradient(#F291C1, #D9558F); }
  #btnMusic{ background:linear-gradient(#4FC9C4, #248F8A); }
  #btnFireworks{ background:linear-gradient(#6A4FC9, #3A2E8F); }
  #btnPaint{ background:linear-gradient(135deg, #FF5A5F, #FFD23F 35%, #6BCB4F 65%, #4AA8E8); }
  #btnWhack{ background:linear-gradient(#9CCC65, #618B3D); }
  #btnFeed{ background:linear-gradient(#9C6ADE, #5E3A9E); }
  #btnRace{ background:linear-gradient(#8FA6B8, #4E6577); }
  #btnMatch{ background:linear-gradient(#EF9A5D, #C25E2A); }
  #btnWash{ background:linear-gradient(#5FC9E0, #2E8FA8); }
  #btnPeek{ background:linear-gradient(#E86A9C, #B23A6E); }
  #btnCatch{ background:linear-gradient(#8ED66F, #4FA05A); }

  /* ---------- PUPS ---------- */
  #pups .ground{ background:linear-gradient(var(--grass), var(--grass-dk)); }
  #pups .hill{ background:#6ECB5A; width:70vmin; height:26vmin; left:-12vmin; bottom:22%; }
  #pups .hill.h2{ background:#4FAE45; width:90vmin; height:30vmin; left:auto; right:-20vmin; bottom:20%; }
  .pup{ font-size:15vmin; }
  .pup .hat{
    position:absolute; top:-4.5vmin; left:50%; transform:translateX(-50%) rotate(-10deg);
    font-size:7vmin;
  }
  #tree{ font-size:30vmin; right:2%; bottom:24%; animation:none; }
  #kitty{
    font-size:8vmin; right:12%; bottom:52%;
    transition:bottom 1s cubic-bezier(.3,1.4,.5,1), right 1s;
    z-index:11;
  }
  #kitty.down{ bottom:16%; right:22%; }
  #bone{ font-size:9vmin; left:38%; bottom:8%; animation:none; }

  /* ---------- DINOS ---------- */
  #dinos{ background:linear-gradient(#A8E0FF, #C9F0D8 70%); }
  #dinos .ground{ background:linear-gradient(var(--jungle), var(--jungle-dk)); }
  #dinos .hill{ background:#5FBE82; width:80vmin; height:24vmin; left:-15vmin; bottom:24%; }
  #volcano{
    position:absolute; right:4%; bottom:26%;
    width:38vmin; height:30vmin; z-index:3;
    border:none; padding:0; cursor:pointer;
    clip-path:polygon(50% 0, 100% 100%, 0 100%);
    background:linear-gradient(#8B5A3C, #5F3A22);
  }
  #volcano::before{
    content:""; position:absolute; top:0; left:32%; width:36%; height:16%;
    background:radial-gradient(#FF6B35, #D93800);
    border-radius:0 0 50% 50%;
  }
  .palm{ font-size:20vmin; animation:none; z-index:4; }
  #trex{ font-size:22vmin; left:6%; bottom:10%; transform:scaleX(-1); animation:flipbob 2.4s ease-in-out infinite; }
  @keyframes flipbob{
    0%,100%{ transform:scaleX(-1) translateY(0); }
    50%{ transform:scaleX(-1) translateY(-1.2vmin); }
  }
  #trex.stomp{ animation:stompflip .6s ease-out; }
  @keyframes stompflip{
    0%,100%{ transform:scaleX(-1) rotate(0); }
    25%{ transform:scaleX(-1) rotate(8deg) translateY(-3vmin); }
    55%{ transform:scaleX(-1) rotate(-4deg); }
    75%{ transform:scaleX(-1) rotate(2deg); }
  }
  #bronto{ font-size:20vmin; left:42%; bottom:14%; }
  #egg{ font-size:11vmin; left:30%; bottom:6%; }
  #egg .baby{ font-size:10vmin; }

  /* ---------- ANIMALS ---------- */
  #animals .ground{ height:36%; }
  #animals.r-jungle{ background:linear-gradient(#9BE29B, #4CAF6D 60%); }
  #animals.r-jungle .ground{ background:linear-gradient(#3E9B52, #2E7A40); }
  #animals.r-savanna{ background:linear-gradient(#FFE3A0, #F2B95C 60%); }
  #animals.r-savanna .ground{ background:linear-gradient(#E0B368, #C08F42); }
  #animals.r-arctic{ background:linear-gradient(#D8F0FF, #A8D8F0 60%); }
  #animals.r-arctic .ground{ background:linear-gradient(#F4FAFF, #C6E2F2); }
  #animals.r-forest{ background:linear-gradient(#BDE8C8, #7CC98E 60%); }
  #animals.r-forest .ground{ background:linear-gradient(#5B8C4A, #437036); }
  #regionTabs{
    position:absolute; top:14vmin; left:50%; transform:translateX(-50%);
    z-index:15; display:flex; gap:2vmin;
  }
  .rtab{
    width:13vmin; height:13vmin; min-width:56px; min-height:56px;
    border:none; border-radius:50%; cursor:pointer;
    background:rgba(255,255,255,.88);
    font-size:6.5vmin; line-height:1;
    box-shadow:0 .8vmin 0 rgba(0,0,0,.15);
    opacity:.65;
    display:flex; align-items:center; justify-content:center;
  }
  .rtab.active{
    opacity:1; transform:scale(1.1);
    box-shadow:0 0 0 .8vmin #FFD23F, 0 .8vmin 0 rgba(0,0,0,.15);
  }
  .animal{ font-size:15vmin; }

  /* animal reaction moves */
  .char.act-flip{ animation:aFlip .9s ease-in-out; }
  @keyframes aFlip{
    0%{ transform:translateY(0) rotate(0); }
    50%{ transform:translateY(-14vmin) rotate(180deg); }
    100%{ transform:translateY(0) rotate(360deg); }
  }
  .char.act-fly{ animation:aFly 1.2s ease-in-out; }
  @keyframes aFly{
    0%,100%{ transform:translate(0,0) rotate(0); }
    40%{ transform:translate(6vmin,-20vmin) rotate(-12deg); }
    70%{ transform:translate(-4vmin,-15vmin) rotate(8deg); }
  }
  .char.act-slither{ animation:aSlither .9s ease-in-out; }
  @keyframes aSlither{
    0%,100%{ transform:translateX(0) skewX(0); }
    25%{ transform:translateX(-5vmin) skewX(-12deg); }
    50%{ transform:translateX(4vmin) skewX(10deg); }
    75%{ transform:translateX(-3vmin) skewX(-8deg); }
  }
  .char.act-pounce{ animation:aPounce .7s ease-out; }
  @keyframes aPounce{
    0%{ transform:translate(0,0) scale(1); }
    35%{ transform:translate(-3vmin,-6vmin) scale(1.15); }
    65%{ transform:translate(-8vmin,0) scale(1.05,.9); }
    100%{ transform:translate(0,0) scale(1); }
  }
  .char.act-chest{ animation:aChest .7s ease-in-out; }
  @keyframes aChest{
    0%,100%{ transform:scale(1); }
    20%,60%{ transform:scale(1.15,1.08); }
    40%,80%{ transform:scale(.95,1); }
  }
  .char.act-stretch{ animation:aStretch 1.1s ease-in-out; transform-origin:50% 100%; }
  @keyframes aStretch{
    0%,100%{ transform:scaleY(1); }
    45%,65%{ transform:scaleY(1.45); }
  }
  .char.act-dash{ animation:aDash 1s ease-in-out; }
  @keyframes aDash{
    0%,100%{ transform:translateX(0) scale(1,1); }
    40%{ transform:translateX(24vmin) scale(1.08,.9); }
    60%{ transform:translateX(24vmin) scale(1,1); }
  }
  .char.act-slide{ animation:aSlide 1.3s ease-in-out; }
  @keyframes aSlide{
    0%,100%{ transform:rotate(0) translateX(0); }
    25%{ transform:rotate(76deg) translateX(2vmin); }
    60%{ transform:rotate(76deg) translateX(18vmin); }
    85%{ transform:rotate(0) translateX(4vmin); }
  }
  .char.act-spinroll{ animation:aSpin 1s ease-in-out; }
  @keyframes aSpin{
    0%,100%{ transform:rotate(0) translateX(0); }
    50%{ transform:rotate(360deg) translateX(8vmin); }
  }
  .char.act-tilt{ animation:aTilt 1.4s ease-in-out; }
  @keyframes aTilt{
    0%,100%{ transform:rotate(0); }
    25%,70%{ transform:rotate(-24deg) translateY(-2vmin); }
  }

  /* ---------- TRUCKS ---------- */
  #trucks{ background:linear-gradient(#FFD9A0, #FFB86B 60%); }
  #trucks .ground{ background:linear-gradient(var(--dirt), var(--dirt-dk)); height:34%; }
  .bunting{
    position:absolute; top:0; left:0; right:0; height:7vmin; z-index:3;
    background:
      linear-gradient(45deg, transparent 50%, #FF5A5F 50%) 0 0/7vmin 7vmin repeat-x,
      linear-gradient(-45deg, transparent 50%, #4AA8E8 50%) 3.5vmin 0/7vmin 7vmin repeat-x;
    opacity:.9;
  }
  .truck{
    position:absolute; z-index:10;
    width:26vmin; height:17vmin;
    border:none; background:none; padding:0; cursor:pointer;
    animation:idle .9s ease-in-out infinite;
    transform-origin:80% 100%;
  }
  @keyframes idle{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-.7vmin); }
  }
  .truck .cab{
    position:absolute; left:4%; right:4%; top:0; height:52%;
    background:var(--tc, var(--cherry));
    border-radius:2.5vmin 5.5vmin 1.5vmin 1.5vmin;
    box-shadow:inset 0 -1.4vmin rgba(0,0,0,.2), 0 .6vmin .8vmin rgba(0,0,0,.2);
  }
  .truck .cab::after{
    content:""; position:absolute; right:10%; top:14%;
    width:26%; height:46%;
    background:linear-gradient(#EAF9FF, #BFE9FF);
    border-radius:1.2vmin;
  }
  .truck .cab::before{
    content:"★"; position:absolute; left:12%; top:18%;
    font-size:4.5vmin; color:rgba(255,255,255,.9);
  }
  .truck .wheel{
    position:absolute; bottom:0; width:10vmin; height:10vmin; border-radius:50%;
    background:radial-gradient(circle, #9aa 0 24%, #222 26% 100%);
    box-shadow:inset 0 0 0 1.1vmin #111, 0 .5vmin .6vmin rgba(0,0,0,.3);
  }
  .truck .w1{ left:0; } .truck .w2{ right:0; }
  .truck.wheelie{ animation:wheelie .8s ease-out; }
  @keyframes wheelie{
    0%{ transform:rotate(0) translateY(0); }
    30%{ transform:rotate(-24deg) translateY(-1vmin); }
    55%{ transform:rotate(-18deg); }
    75%{ transform:rotate(3deg) translateY(0); }
    100%{ transform:rotate(0); }
  }
  .truck.bigjump{ animation:bigjump 1s ease-out; }
  @keyframes bigjump{
    0%{ transform:translateY(0) rotate(0); }
    35%{ transform:translateY(-16vmin) rotate(-14deg); }
    65%{ transform:translateY(-10vmin) rotate(8deg); }
    85%{ transform:translateY(.6vmin) rotate(0) scale(1.04,.92); }
    100%{ transform:translateY(0) scale(1,1); }
  }
  #ramp{
    position:absolute; right:4%; bottom:10%; z-index:9;
    width:24vmin; height:13vmin;
    border:none; padding:0; cursor:pointer;
    clip-path:polygon(0 100%, 100% 0, 100% 100%);
    background:repeating-linear-gradient(45deg, #F2A541 0 2.4vmin, #D97E1E 2.4vmin 4.8vmin);
    box-shadow:0 .6vmin 0 rgba(0,0,0,.2);
  }
  #tires{
    position:absolute; left:3%; bottom:12%; z-index:9;
    border:none; background:none; padding:0; cursor:pointer;
    display:flex; flex-direction:column; gap:.6vmin;
  }
  #tires .tire{
    width:11vmin; height:4.5vmin; border-radius:2.5vmin;
    background:radial-gradient(ellipse at center, #555 0 30%, #1d1d1d 34% 100%);
    box-shadow:inset 0 -1vmin rgba(0,0,0,.4);
  }
  #tires.squash{ animation:squash .5s ease-out; }
  @keyframes squash{
    0%,100%{ transform:scale(1,1); }
    35%{ transform:scale(1.2,.7); }
    70%{ transform:scale(.95,1.1); }
  }

  /* ---------- DIGGERS ---------- */
  #diggers{ background:linear-gradient(#BDE8FF, #9AD4F5 60%); }
  #diggers .ground{ background:linear-gradient(var(--dirt), var(--dirt-dk)); height:32%; }
  #crane{ font-size:30vmin; right:6%; bottom:26%; animation:none; z-index:5; }
  #digger{ font-size:17vmin; left:5%; bottom:12%; }
  #digger > span{ display:inline-block; transform:scaleX(-1); }
  .cone{ font-size:8vmin; }
  #tower{
    position:absolute; left:44%; bottom:13%; width:17vmin; z-index:10;
    border:none; background:none; padding:0; cursor:pointer;
    display:grid; grid-template-columns:1fr 1fr; gap:.6vmin;
  }
  #tower .block{
    height:5.5vmin; border-radius:.8vmin;
    box-shadow:inset 0 -1vmin rgba(0,0,0,.18), 0 .4vmin .4vmin rgba(0,0,0,.15);
  }

  /* ---------- TRAINS ---------- */
  #trains .ground{ background:linear-gradient(var(--grass), var(--grass-dk)); height:26%; }
  #track{
    position:absolute; left:0; right:0; bottom:13%; height:5vmin; z-index:4;
    background:
      linear-gradient(transparent 30%, #4A4A4A 30% 42%, transparent 42% 62%, #4A4A4A 62% 74%, transparent 74%),
      repeating-linear-gradient(90deg, #8B5E3C 0 2.5vmin, transparent 2.5vmin 8vmin);
  }
  #train{ bottom:14%; font-size:13vmin; }
  #tunnel{
    position:absolute; right:-2vmin; bottom:13%; z-index:13;

  /* ============ speech (real, recognizable animal sounds) ============ */
  var VOICES = [];
  function loadVoices(){
    try{ VOICES = window.speechSynthesis.getVoices() || []; }catch(e){ VOICES = []; }
  }
  if('speechSynthesis' in window){
    loadVoices();
    try{ window.speechSynthesis.onvoiceschanged = loadVoices; }catch(e){}
  }
  function pickVoice(){
    if(!VOICES.length) return null;
    var en = VOICES.filter(function(v){ return /^en/i.test(v.lang || ''); });
    return en[0] || VOICES[0];
  }
  function say(text, pitch, rate){
    if(muted) return;
    if(!('speechSynthesis' in window)) return;
    try{
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.pitch = (pitch == null) ? 1.5 : pitch;
      u.rate  = (rate  == null) ? 0.95 : rate;
      u.volume = 1;
      var v = pickVoice(); if(v) u.voice = v;
      window.speechSynthesis.speak(u);
    }catch(e){}
  }

  /* ============ particles ============ */
  var fx = $('#fx');
  var COLORS = ['#FF5A5F','#FFD23F','#4AA8E8','#6BCB4F','#B07CE8'];
  function burst(x, y, emojis, n){
    n = n || 8;
    for(var i=0;i<n;i++){
      var p = document.createElement('span');
      p.className = 'p';
      var isDot = Math.random() < 0.35 || !emojis.length;
      if(isDot){
        p.className += ' dot';
        var s = 1 + Math.random()*1.6;
        p.style.width = s+'vmin'; p.style.height = s+'vmin';
        p.style.background = COLORS[Math.floor(Math.random()*COLORS.length)];
      } else {
        p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        p.style.fontSize = (3 + Math.random()*3)+'vmin';
      }
      p.style.left = x+'px'; p.style.top = y+'px';
      fx.appendChild(p);
      var ang = Math.random()*Math.PI*2;
      var dist = 40 + Math.random()*110;
      var dx = Math.cos(ang)*dist, dy = Math.sin(ang)*dist - 60;
      p.animate([
        { transform:'translate(-50%,-50%) scale(.6)', opacity:1 },
        { transform:'translate(calc(-50% + '+dx+'px), calc(-50% + '+dy+'px)) scale(1.15) rotate('+(Math.random()*180-90)+'deg)', opacity:0 }
      ], { duration: 550 + Math.random()*350, easing:'cubic-bezier(.2,.8,.4,1)' })
      .onfinish = function(){ this.effect.target.remove(); };
    }
  }
  function confettiRain(n){
    n = n || 30;
    var w = window.innerWidth, h = window.innerHeight;
    for(var i=0;i<n;i++){
      var p = document.createElement('span');
      p.className = 'p';
      if(Math.random() < 0.5){
        p.className += ' dot';
        var s = 1.2 + Math.random()*1.8;
        p.style.width = s+'vmin'; p.style.height = s+'vmin';
        p.style.background = COLORS[Math.floor(Math.random()*COLORS.length)];
      } else {
        p.textContent = ['⭐','🎉','✨','🎈'][Math.floor(Math.random()*4)];
        p.style.fontSize = (3.5 + Math.random()*3.5)+'vmin';
      }
      p.style.left = (Math.random()*w)+'px'; p.style.top = '-6vh';
      fx.appendChild(p);
      p.animate([
        { transform:'translateY(0) rotate(0deg)', opacity:1 },
        { transform:'translateY('+(h*1.15)+'px) rotate('+(Math.random()*540-270)+'deg)', opacity:.9 }
      ], { duration: 1300 + Math.random()*1200, easing:'cubic-bezier(.3,.1,.6,1)', delay: Math.random()*400 })
      .onfinish = function(){ this.effect.target.remove(); };
    }
  }

  function shuffle(a){
    for(var i=a.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var t = a[i]; a[i] = a[j]; a[j] = t;

  }
  function updateFindUI(){
    lvlBadge.textContent = '⭐ ' + level;
    var nextEm = null;
    targets.forEach(function(t){ if(!nextEm && !t.found) nextEm = t.em; });
    findTargetEl.textContent = nextEm || '🎉';
    targets.forEach(function(t){
      t.slot.classList.toggle('done', t.found);
      t.slot.classList.toggle('now', !t.found && t.em === nextEm);
    });
  }
  function newFindRound(){
    findBusy = false;
    findField.innerHTML = '';
    $$('#findList .fslot').forEach(function(s){ s.remove(); });
    var pi;
    do{ pi = Math.floor(Math.random()*POOLS.length); }while(pi === lastPool);
    lastPool = pi;
    var pool = POOLS[pi].slice();
    shuffle(pool);
    var tc = Math.min(3 + Math.floor((level-1)/2), 5);       // targets on the list
    var total = Math.min(24 + (level-1)*6, 60);              // items on the field
    targets = pool.slice(0, tc).map(function(em){
      var slot = document.createElement('span');
      slot.className = 'fslot';
      slot.textContent = em;
      findList.appendChild(slot);
      return { em: em, found: false, slot: slot };
    });
    var others = pool.slice(tc);
    var items = targets.map(function(t){ return t.em; });
    for(var i=items.length;i<total;i++) items.push(others[Math.floor(Math.random()*others.length)]);
    shuffle(items);
    var cols = total <= 24 ? 6 : (total <= 42 ? 8 : 9);
    var rows = Math.ceil(total / cols);
    var sizeCls = total <= 24 ? '' : (total <= 42 ? ' small' : ' tiny');
    var cells = [];
    for(var r=0;r<rows;r++) for(var c=0;c<cols;c++) cells.push({ r:r, c:c });
    shuffle(cells);
    items.forEach(function(em, i){
      var cell = cells[i];
      var b = document.createElement('button');
      b.className = 'fitem' + sizeCls;
      b.textContent = em;
      b.setAttribute('aria-label','find item');
      b.style.left = (cell.c*(100/cols) + 2 + Math.random()*(100/cols)*0.35) + '%';
      b.style.top = (cell.r*(100/rows) + 2 + Math.random()*(100/rows)*0.3) + '%';
      b.style.animationDelay = (-Math.random()*2.4)+'s';
      findField.appendChild(b);
      b.addEventListener('pointerdown', function(e){
        e.preventDefault(); e.stopPropagation();
        ctx();
        if(findBusy) return;
        var t = null;
        targets.forEach(function(tt){ if(!tt.found && tt.em === em) t = tt; });
        if(t){
          t.found = true;
          var c0 = center(b);
          burst(c0.x, c0.y, ['⭐','✨','🌟'], 12);
          b.classList.add('found');
          star();
          var left = targets.filter(function(tt){ return !tt.found; }).length;
          if(left === 0){
            findBusy = true;
            S.tada();
            level++;
            saveLevel();
            updateFindUI();
            setTimeout(function(){
              lvlToast.querySelector('.msg').textContent = 'LEVEL ' + level + '! 🚀';
              lvlToast.classList.add('show');
              confettiRain(16);
              setTimeout(function(){
                lvlToast.classList.remove('show');
                newFindRound();
              }, 1600);
            }, 500);

            S.sparkle();
            updateFindUI();
          }
        } else {
          tone(220,140,.18,'square',.14);
          replay(b, 'wiggle');
        }
      });
    });
    updateFindUI();
  }

        p.className = 'p dot';
        var s = 1 + Math.random()*1.4;
        p.style.width = s+'vmin'; p.style.height = s+'vmin';
        p.style.background = (i % 4 === 0) ? '#FFF6D6' : col;
        p.style.left = x+'px'; p.style.top = y+'px';
        fx.appendChild(p);
        var ang = (i/18)*Math.PI*2 + Math.random()*.3;
        var dist = 70 + Math.random()*90;
        var dx = Math.cos(ang)*dist, dy = Math.sin(ang)*dist;
        p.animate([
          { transform:'translate(-50%,-50%)', opacity:1 },
          { transform:'translate(calc(-50% + '+dx+'px), calc(-50% + '+(dy+45)+'px)) scale(.5)', opacity:0 }
        ], { duration: 850 + Math.random()*350, easing:'cubic-bezier(.1,.8,.5,1)' })
        .onfinish = function(){ this.effect.target.remove(); };
      }
    };
  }
  fwScene.addEventListener('pointerdown', function(e){
    ctx();
    firework(e.clientX, Math.max(e.clientY, window.innerHeight*0.12));
    star();
  });
  setInterval(function(){
    if(fwScene.classList.contains('active')){
      firework(
        window.innerWidth*(0.15 + Math.random()*0.7),
        window.innerHeight*(0.15 + Math.random()*0.35)
      );
    }
  }, 3600);

  /* ============ PAINT ============ */
  var pCanvas = $('#paintCanvas'), pCtx = pCanvas.getContext('2d');
  var PAINTS = ['#FF5A5F','#F2A541','#FFD23F','#6BCB4F','#4AA8E8','#B07CE8','#F291C1','#5B4226'];
  var brush = PAINTS[0], rainbow = false, hue = 0;
  function sizeCanvas(){
    var r = pCanvas.getBoundingClientRect();
    if(r.width === 0) return;
    var dpr = window.devicePixelRatio || 1;
    pCanvas.width = Math.round(r.width * dpr);
    pCanvas.height = Math.round(r.height * dpr);
    pCtx.setTransform(dpr,0,0,dpr,0,0);
    pCtx.lineCap = 'round'; pCtx.lineJoin = 'round';
  }
  window.addEventListener('resize', sizeCanvas);
  $('#btnPaint').addEventListener('pointerdown', function(){ setTimeout(sizeCanvas, 60); });
  function strokeColor(){
    if(!rainbow) return brush;
    hue = (hue + 8) % 360;
    return 'hsl(' + hue + ', 85%, 55%)';
  }
  var strokes = {};
  pCanvas.addEventListener('pointerdown', function(e){
    e.preventDefault(); e.stopPropagation();
    ctx();
    if(pCanvas.setPointerCapture){ try{ pCanvas.setPointerCapture(e.pointerId); }catch(err){} }
    var r = pCanvas.getBoundingClientRect();
    strokes[e.pointerId] = { x: e.clientX - r.left, y: e.clientY - r.top };
    S.plip();
    star();
    pCtx.fillStyle = strokeColor();
    pCtx.beginPath();
    pCtx.arc(strokes[e.pointerId].x, strokes[e.pointerId].y, 12, 0, Math.PI*2);
    pCtx.fill();
  });
  pCanvas.addEventListener('pointermove', function(e){
    var s = strokes[e.pointerId];
    if(!s) return;
    var r = pCanvas.getBoundingClientRect();
    var nx = e.clientX - r.left, ny = e.clientY - r.top;
    pCtx.strokeStyle = strokeColor();
    pCtx.lineWidth = 24;
    pCtx.beginPath();
    pCtx.moveTo(s.x, s.y);
    pCtx.lineTo(nx, ny);
    pCtx.stroke();
    s.x = nx; s.y = ny;
  });
  ['pointerup','pointercancel'].forEach(function(ev){
    pCanvas.addEventListener(ev, function(e){ delete strokes[e.pointerId]; });
  });
  var paletteEl = $('#palette');
  function swatch(bg, label, onPick, txt){
    var b = document.createElement('button');
    b.className = 'swatch';
    b.style.background = bg;
    if(txt) b.textContent = txt;
    b.setAttribute('aria-label', label);
    paletteEl.appendChild(b);
    b.addEventListener('pointerdown', function(e){
      e.preventDefault(); ctx();
      onPick(b);
    });
    return b;
  }
  PAINTS.forEach(function(c, i){
    var b = swatch(c, 'paint color', function(me){
      rainbow = false; brush = c;
      $$('#palette .swatch').forEach(function(s){ s.classList.remove('active'); });
      me.classList.add('active');
      S.pop();
    });
    if(i === 0) b.classList.add('active');
  });
  swatch('#fff', 'rainbow brush', function(me){
    rainbow = true;
    $$('#palette .swatch').forEach(function(s){ s.classList.remove('active'); });
    me.classList.add('active');
    S.sparkle();
  }, '🌈');
  swatch('#fff', 'clear painting', function(){
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    S.whoosh();
  }, '🗑️');

  /* ============ WHACK ============ */
  var whackScene = $('#whack'), holesEl = $('#holes');
  var CRITTERS = ['🐹','🐰','🐸','🐿️','🦔','🐭','🐤'];
  var whackLevel = 1, whacks = 0;
  try{ whackLevel = Math.max(1, parseInt(localStorage.getItem('wrv-whack-level'),10) || 1); }catch(err){}
  var holeCritters = [];
  for(var h=0; h<6; h++){
    (function(){
      var wrap = document.createElement('div');
      wrap.className = 'holeWrap';
      var hole = document.createElement('span');
      hole.className = 'hole';
      var cr = document.createElement('button');
      cr.className = 'critter';
      cr.textContent = '🐹';
      cr.setAttribute('aria-label','critter');
      wrap.appendChild(hole); wrap.appendChild(cr);
      holesEl.appendChild(wrap);
      cr.addEventListener('pointerdown', function(e){
        e.preventDefault(); e.stopPropagation(); ctx();
        if(!cr.classList.contains('up') || cr.classList.contains('bonked')) return;
        S.bonk();
        cr.classList.add('bonked');
        var c = center(cr);
        burst(c.x, c.y, ['💫','⭐'], 8);
        star();
        whacks++;
        if(whacks % 10 === 0){
          whackLevel++;
          try{ localStorage.setItem('wrv-whack-level', String(whackLevel)); }catch(err){}
          S.tada();
          lvlToast.querySelector('.msg').textContent = 'LEVEL ' + whackLevel + '! 🐹';
          lvlToast.classList.add('show');
          confettiRain(14);
          setTimeout(function(){ lvlToast.classList.remove('show'); }, 1400);
        }
        setTimeout(function(){ cr.classList.remove('up','bonked'); }, 220);
      });
      holeCritters.push(cr);
    })();
  }
  (function popLoop(){
    var gap = Math.max(650, 1350 - (whackLevel-1)*80);
    setTimeout(function(){
      if(whackScene.classList.contains('active')){
        var free = holeCritters.filter(function(c){ return !c.classList.contains('up'); });
        if(free.length){
          var cr = free[Math.floor(Math.random()*free.length)];
          cr.textContent = CRITTERS[Math.floor(Math.random()*CRITTERS.length)];
          cr.classList.add('up');
          S.plip();
          var upFor = Math.max(600, 1000 - (whackLevel-1)*35);
          setTimeout(function(){ cr.classList.remove('up','bonked'); }, upFor);
        }
      }
      popLoop();
    }, gap);
  })();

  /* ============ FEED ============ */
  var monster = $('#monster'), foodField = $('#foodField');
  var FOODS = ['🍎','🍌','🍕','🍪','🧁','🍉','🍓','🥕','🍦','🍔'];
  var FOOD_SLOTS = [
    { l:'6%',  t:'20%' }, { l:'78%', t:'20%' },
    { l:'3%',  t:'52%' }, { l:'82%', t:'52%' },
    { l:'16%', t:'82%' }, { l:'68%', t:'82%' }
  ];
  var fed = 0;
  FOOD_SLOTS.forEach(function(slot, i){
    var f = document.createElement('button');
    f.className = 'food';
    f.textContent = FOODS[Math.floor(Math.random()*FOODS.length)];
    f.style.left = slot.l; f.style.top = slot.t;
    f.style.animationDelay = (-i*0.5)+'s';
    f.setAttribute('aria-label','food');
    foodField.appendChild(f);
    var busy = false;
    f.addEventListener('pointerdown', function(e){
      e.preventDefault(); e.stopPropagation(); ctx();
      if(busy) return;
      busy = true;
      star();
      var fr = f.getBoundingClientRect();
      var mr = monster.getBoundingClientRect();
      var dx = (mr.left + mr.width/2) - (fr.left + fr.width/2);
      var dy = (mr.top + mr.height*0.72) - (fr.top + fr.height/2);
      monster.classList.add('munch');
      var fly = f.animate([
        { transform:'translate(0,0) scale(1)', opacity:1 },
        { transform:'translate('+dx+'px,'+dy+'px) scale(.25) rotate(180deg)', opacity:.9 }
      ], { duration:450, easing:'cubic-bezier(.4,0,1,1)', fill:'forwards' });
      fly.onfinish = function(){
        S.chomp();
        S.gulp();
        var mr2 = monster.getBoundingClientRect();
        burst(mr2.left + mr2.width/2, mr2.top + mr2.height*0.72, ['✨','💜'], 6);
        fed++;
        setTimeout(function(){ monster.classList.remove('munch'); }, 350);
        if(fed % 5 === 0){
          setTimeout(function(){
            S.burp();
            replay(monster, 'burp');
            var mr3 = monster.getBoundingClientRect();
            burst(mr3.left + mr3.width/2, mr3.top + mr3.height*0.4, ['💨','💜','🎵'], 10);
          }, 550);
        }
        setTimeout(function(){
          fly.cancel();
          f.textContent = FOODS[Math.floor(Math.random()*FOODS.length)];
          S.pop();
          replay(f, 'jump');
          busy = false;
        }, 900);
      };
    });
  });

  /* ============ RACE ============ */
  var raceScene = $('#race'), playerCar = $('#playerCar'), turtle = $('#turtle');
  var playerX = 4, turtleX = 4, raceOver = false;
  function setRacePos(){
    playerCar.style.left = playerX + '%';
    turtle.style.left = turtleX + '%';
  }
  function resetRace(){
    playerX = 4; turtleX = 4; raceOver = false;
    setRacePos();
  }
  resetRace();
  raceScene.addEventListener('pointerdown', function(e){
    ctx();
    if(raceOver) return;
    S.vroomTap();
    playerX = Math.min(playerX + 3.5, 86);
    setRacePos();
    var r = playerCar.getBoundingClientRect();
    burst(r.left + 6, r.bottom - 8, ['💨'], 2);
    if(playerX >= 86){
      raceOver = true;
      S.tada();
      setTimeout(function(){ S.honk(); }, 500);
      lvlToast.querySelector('.msg').textContent = '🏆 YOU WIN!';
      lvlToast.classList.add('show');
      confettiRain(24);
      star();
      setTimeout(function(){
        lvlToast.classList.remove('show');
        resetRace();
      }, 2400);
    }
  });
  setInterval(function(){
    if(raceScene.classList.contains('active') && !raceOver){
      turtleX = Math.min(turtleX + 0.5, 80);
      setRacePos();
    }
  }, 300);
  $('#btnRace').addEventListener('pointerdown', resetRace);

  /* ============ MATCH (memory pairs) ============ */
  var matchGrid = $('#matchGrid');
  var matchLevel = 1;
  try{ matchLevel = Math.max(1, parseInt(localStorage.getItem('wrv-match-level'),10) || 1); }catch(err){}
  var firstCard = null, matchLock = false, matchesFound = 0, matchPairs = 3;
  var MLAYOUT = { 6:[3,2], 8:[4,2], 10:[5,2], 12:[4,3] };
  function buildMatch(){
    matchGrid.innerHTML = '';
    firstCard = null; matchLock = false; matchesFound = 0;
    matchPairs = Math.min(2 + matchLevel, 6);
    var pool = POOLS[Math.floor(Math.random()*POOLS.length)].slice();
    shuffle(pool);
    var picks = pool.slice(0, matchPairs);
    var deck = shuffle(picks.concat(picks));
    var lay = MLAYOUT[deck.length] || [4,3];
    matchGrid.style.gridTemplateColumns = 'repeat(' + lay[0] + ',1fr)';
    matchGrid.style.gridTemplateRows = 'repeat(' + lay[1] + ',1fr)';
    deck.forEach(function(em){
      var c = document.createElement('button');
      c.className = 'mcard';
      c.setAttribute('aria-label','card');
      c.innerHTML = '<span class="face back">❓</span><span class="face front">' + em + '</span>';
      matchGrid.appendChild(c);
      c.addEventListener('pointerdown', function(e){
        e.preventDefault(); e.stopPropagation(); ctx();
        if(matchLock || c.classList.contains('flipped') || c.classList.contains('matched')) return;
        S.pop();
        c.classList.add('flipped');
        if(!firstCard){ firstCard = c; return; }
        var a = firstCard;
        if(em === a.querySelector('.front').textContent){
          a.classList.add('matched'); c.classList.add('matched');
          firstCard = null;
          matchesFound++;
          S.yay();
          var ctr = center(c); burst(ctr.x, ctr.y, ['⭐','✨'], 8);
          star();
          if(matchesFound >= matchPairs){
            matchLock = true;
            matchLevel++;
            try{ localStorage.setItem('wrv-match-level', String(matchLevel)); }catch(err){}
            setTimeout(function(){
              S.tada();
              lvlToast.querySelector('.msg').textContent = 'LEVEL ' + matchLevel + '! 🃏';
              lvlToast.classList.add('show');
              confettiRain(16);
              setTimeout(function(){ lvlToast.classList.remove('show'); buildMatch(); }, 1700);
            }, 500);
          }
        } else {
          matchLock = true;
          var b = c;
          setTimeout(function(){
            a.classList.remove('flipped'); b.classList.remove('flipped');
            firstCard = null; matchLock = false;
          }, 950);
        }
      });
    });
  }
  buildMatch();
  $('#btnMatch').addEventListener('pointerdown', function(){ buildMatch(); });

  /* ============ WASH (scrub the mud) ============ */
  var washVehicle = $('#washVehicle'), mudCanvas = $('#mudCanvas'), mCtx = mudCanvas.getContext('2d');
  var washHint = $('#washHint'), washSponge = $('#washSponge');
  var WASH_V = ['🚚','🚗','🚜','🚑','🏎️','🚌','🚓','🚒','🚙','🛻'];
  var washing = false, washMoves = 0;
  function drawMud(){
    var r = mudCanvas.getBoundingClientRect();
    if(r.width === 0) return;
    var dpr = window.devicePixelRatio || 1;
    mudCanvas.width = Math.round(r.width * dpr);
    mudCanvas.height = Math.round(r.height * dpr);
    mCtx.setTransform(dpr,0,0,dpr,0,0);
    mCtx.globalCompositeOperation = 'source-over';
    mCtx.fillStyle = '#6B4A2A';
    mCtx.fillRect(0,0,r.width,r.height);
    for(var i=0;i<80;i++){
      mCtx.fillStyle = ['#5B3A1E','#7C5A34','#4A3018','#8A6740'][i%4];
      mCtx.beginPath();
      mCtx.arc(Math.random()*r.width, Math.random()*r.height, 3+Math.random()*8, 0, Math.PI*2);
      mCtx.fill();
    }
    washing = false; washMoves = 0;
    washVehicle.classList.remove('clean');
    washHint.style.display = '';
  }
  function eraseAt(clientX, clientY){
    var r = mudCanvas.getBoundingClientRect();
    var x = clientX - r.left, y = clientY - r.top;
    mCtx.globalCompositeOperation = 'destination-out';
    mCtx.beginPath();
    mCtx.arc(x, y, 30, 0, Math.PI*2);
    mCtx.fill();
    washSponge.style.left = clientX + 'px';
    washSponge.style.top = clientY + 'px';
  }
  function clearedRatio(){
    var w = mudCanvas.width, h = mudCanvas.height;
    if(!w) return 0;
    var data = mCtx.getImageData(0,0,w,h).data;
    var clear = 0, total = 0, step = 40;
    for(var i=3;i<data.length;i+=4*step){ total++; if(data[i] < 40) clear++; }
    return total ? clear/total : 0;
  }
  var washDown = {};
  mudCanvas.addEventListener('pointerdown', function(e){
    e.preventDefault(); e.stopPropagation(); ctx();
    if(mudCanvas.setPointerCapture){ try{ mudCanvas.setPointerCapture(e.pointerId); }catch(err){} }
    washDown[e.pointerId] = true;
    washSponge.style.opacity = '1';
    eraseAt(e.clientX, e.clientY);
    S.scrub();
  });
  mudCanvas.addEventListener('pointermove', function(e){
    if(!washDown[e.pointerId]) return;
    eraseAt(e.clientX, e.clientY);
    washMoves++;
    if(washMoves % 5 === 0) S.scrub();
    if(!washing && washMoves % 12 === 0 && clearedRatio() > 0.6){
      washing = true;
      washHint.style.display = 'none';
      mCtx.globalCompositeOperation = 'destination-out';
      mCtx.fillRect(0,0,mudCanvas.width,mudCanvas.height);
      washVehicle.classList.add('clean');
      S.yay();
      var vr = washVehicle.getBoundingClientRect();
      burst(vr.left + vr.width/2, vr.top + vr.height/2, ['✨','⭐','💧'], 16);
      star();
      setTimeout(function(){
        washVehicle.textContent = WASH_V[Math.floor(Math.random()*WASH_V.length)];
        drawMud();
      }, 1700);
    }
  });
  ['pointerup','pointercancel'].forEach(function(ev){
    mudCanvas.addEventListener(ev, function(e){
      delete washDown[e.pointerId];
      if(!Object.keys(washDown).length) washSponge.style.opacity = '0';
    });
  });
  $('#btnWash').addEventListener('pointerdown', function(){ setTimeout(drawMud, 70); });
  window.addEventListener('resize', function(){
    if($('#wash').classList.contains('active')) drawMud();
  });

  /* ============ PEEK (peekaboo doors) ============ */
  var peekGrid = $('#peekGrid');
  var DOOR_COLORS = ['#E2574C','#F2A541','#6BCB4F','#4AA8E8','#B07CE8','#F291C1'];
  var PEEK_ITEMS = [
    ['🐶',function(){ say('Woof woof!',1.3,1); }], ['🐱',function(){ say('Meow!',1.7,1); }],
    ['🐮',function(){ say('Moooo!',1.0,.8); }],    ['🐷',function(){ say('Oink oink!',1.4,.95); }],
    ['🐔',function(){ say('Cluck cluck!',1.6,1); }],['🦆',function(){ say('Quack quack!',1.5,1); }],
    ['🐵',function(){ say('Ooh ooh ah ah!',1.5,1); }],['🦁',function(){ say('Roar!',0.6,.8); }],
    ['🐸',function(){ say('Ribbit!',1.2,1); }],    ['🚗',S.honk], ['🎈',S.bang], ['🐝',S.flutby],
    ['⭐',S.sparkle], ['🦉',function(){ say('Hoot! Hoot!',1.3,.95); }], ['🐺',function(){ say('Awooo!',1.0,.75); }]
  ];
  for(var d=0; d<6; d++){
    (function(){
      var door = document.createElement('button');
      door.className = 'door';
      door.setAttribute('aria-label','door');
      var inside = document.createElement('span');
      inside.className = 'doorInside';
      inside.innerHTML = '<span class="peekEmoji">⭐</span>';
      var panel = document.createElement('span');
      panel.className = 'doorPanel';
      panel.style.setProperty('--dc', DOOR_COLORS[d]);
      door.appendChild(inside);
      door.appendChild(panel);
      peekGrid.appendChild(door);
      var open = false, busy = false;
      door.addEventListener('pointerdown', function(e){
        e.preventDefault(); e.stopPropagation(); ctx();
        if(busy) return;
        open = !open;
        if(open){
          var pick = PEEK_ITEMS[Math.floor(Math.random()*PEEK_ITEMS.length)];
          inside.querySelector('.peekEmoji').textContent = pick[0];
          door.classList.add('open');
          S.creak();
          busy = true;
          setTimeout(function(){
            pick[1]();
            var c = center(inside);
            burst(c.x, c.y, ['✨','⭐'], 7);
            busy = false;
          }, 260);
          star();
        } else {
          door.classList.remove('open');
          S.pop();
        }
      });
    })();
  }

  /* ============ CATCH (butterflies) ============ */
  var catchScene = $('#catch');
  var FLY = ['🦋','🐝','🐞','🦋','🦋'];
  function spawnFly(){
    if(!catchScene.classList.contains('active')) return;
    if(catchScene.querySelectorAll('.flutter').length >= 6) return;
    var b = document.createElement('button');
    b.className = 'flutter';
    b.setAttribute('aria-label','butterfly');
    b.innerHTML = '<span>' + FLY[Math.floor(Math.random()*FLY.length)] + '</span>';
    b.style.left = (5 + Math.random()*78) + '%';
    b.style.top = (12 + Math.random()*52) + '%';
    catchScene.appendChild(b);
    var frames = [{ transform:'translate(0,0) rotate(0)' }];
    for(var k=0;k<5;k++){
      frames.push({ transform:'translate(' + (Math.random()*28-14) + 'vw,' + (Math.random()*22-11) + 'vh) rotate(' + (Math.random()*24-12) + 'deg)' });
    }
    var anim = b.animate(frames, {
      duration: 6000 + Math.random()*4000,
      iterations: Infinity, direction: 'alternate', easing: 'ease-in-out'
    });
    b.addEventListener('pointerdown', function(e){
      e.preventDefault(); e.stopPropagation(); ctx();
      S.flutby(); S.pop();
      var c = center(b);
      burst(c.x, c.y, ['✨','💛','⭐'], 9);
      if(anim) anim.cancel();
      b.remove();
      star();
    });
  }
  setInterval(function(){ spawnFly(); }, 800);
  $('#btnCatch').addEventListener('pointerdown', function(){
    for(var j=0;j<4;j++) setTimeout(spawnFly, j*200);
  });

  /* ============ offline support ============ */
  if('serviceWorker' in navigator && location.protocol === 'https:'){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  }

})();
</script>
</body>
</html>
